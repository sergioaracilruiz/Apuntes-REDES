site_name: Instalación física de redes
site_description: Apuntes y documentación sobre instalación de redes LAN
site_author: Sergio Aracil Ruiz

theme:
  name: material
  language: es
  features:
    - navigation.sections
    - navigation.top
    - navigation.expand
    - content.code.copy
    - search.highlight

nav:
  - Inicio: index.md
  - Capítulo 01 · Medios de transmisión: 01_medios.md
  - Capítulo 02 · Conectores y herramientas: 02_conectores.md
  - Capítulo 03 · Tarjeta de red: 03_tarjeta_red.md
  - Capítulo 04 · Ethernet: 04_ethernet.md
  - Capítulo 05 · Cableado estructurado: 05_cableado.md
  - Capítulo 06 · Gestión de residuos: 06_residuos.md
  - Recursos y esquemas: recursos.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

plugins:
  - search
