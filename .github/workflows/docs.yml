name: MkDocs – Build and Deploy to GitHub Pages

# -------------------------------------------------------------------
# EVENTOS QUE DISPARAN EL WORKFLOW
# -------------------------------------------------------------------
# - En pull_request: solo se construye (build), NO se publica
# - En push a main: se construye y SE PUBLICA
# -------------------------------------------------------------------

on:
  pull_request:
  push:
    branches:
      - main

# -------------------------------------------------------------------
# PERMISOS
# Necesarios para poder escribir en la rama gh-pages
# -------------------------------------------------------------------

permissions:
  contents: write

# -------------------------------------------------------------------
# JOB 1: BUILD (validación)
# Se ejecuta SIEMPRE: push y pull_request
# -------------------------------------------------------------------

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cachear dependencias de pip (acelera el workflow)
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/mkdocs.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Instalar dependencias
      - name: Install MkDocs dependencies
        run: |
          pip install mkdocs mkdocs-material

      # 5. Construir el sitio (NO publica)
      - name: Build MkDocs site
        run: |
          mkdocs build --strict

# -------------------------------------------------------------------
# JOB 2: DEPLOY (publicación)
# SOLO se ejecuta en push a main
# -------------------------------------------------------------------

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    # CONDICIÓN CLAVE:
    # Este job NO se ejecuta si el evento es un pull_request
    if: github.event_name == 'push'

    steps:
      # 1. Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cachear dependencias de pip
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/mkdocs.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Instalar dependencias
      - name: Install MkDocs dependencies
        run: |
          pip install mkdocs mkdocs-material

      # 5. Generar y publicar en GitHub Pages
      - name: Deploy MkDocs site
        run: |
          mkdocs gh-deploy --force
